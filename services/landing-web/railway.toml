# Railway configuration for Landing Page (Static Next.js)
# IMPORTANT: Set Root Directory to "/" (repo root) in Railway dashboard
# IMPORTANT: Set Config File Path to "services/landing-web/railway.toml"
# Docs: https://docs.railway.com/guides/build-configuration

[build]
builder = "DOCKERFILE"
dockerfilePath = "services/landing-web/Dockerfile"
watchPatterns = ["/services/landing-web/**", "/packages/ui/**"]

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
