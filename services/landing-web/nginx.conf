# Production nginx configuration for Railway deployment
# Note: Local dev server (pnpm dev) runs on port 3001
# Production nginx serves static files on port 3000 (Railway default)
server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Handle trailing slashes and clean URLs
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Cache static assets
    location /_next/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /images/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
