name: Deploy landing site to GitHub Pages

# Builds services/landing-web (Next.js static export) from the pnpm workspace
# and publishes the static `out/` directory to GitHub Pages.
# Served from the custom domain rereflect.ca (see services/landing-web/public/CNAME).

on:
  push:
    branches: [master]
    paths:
      - 'services/landing-web/**'
      - 'packages/ui/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/deploy-landing.yml'
  workflow_dispatch:

# Allow only one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build landing site
        run: pnpm build:landing
        env:
          # The hosted SaaS app/API no longer exist (product is self-hosted OSS).
          # Point CTAs at the repo until the landing copy is revised for self-hosting.
          NEXT_PUBLIC_APP_URL: https://github.com/haqaliz/rereflect

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: services/landing-web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
